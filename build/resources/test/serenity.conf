webdriver {
  driver = chrome
  autodownload = true
  timeouts {
    implicitlywait = 5000
    fluentwait = 5000
  }
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["--no-sandbox", "--disable-dev-shm-usage", "--disable-gpu", "--window-size=1920,1080"]
    }
  }
}

serenity {
  project.name = "Automatización Frontend - POM Factory"
  take.screenshots = AFTER_EACH_STEP
}

headless.mode = false

environments {
  default {
    webdriver.base.url = "http://localhost:80"
  }
}
